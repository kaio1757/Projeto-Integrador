<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atributos Globais</title>
    </head>
    <body>
        <h1>Atributos Globais</h1>
        <!-- id - identificador único-->
        <p id="mensagem">Olá, mundo!</p>
        <!-- Class (classe) - Permite agrupar vários elementos com os mesmo estilo e comportamento -->
        <p class="destaque">Texto importante.</p>
        <p class="destaque">Outro Texto importante.</p>

        <!-- style(estilo inline) - Aplica CSS direto no elemento -->
         <h1 style="color: rgb(33, 147, 33);">Titulo verde</h1>
    </body>
</html>
